server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Same-origin Module Federation: UI loads remotes as http://<host>:31030/mf/.../assets/...
  # so the browser never cross-fetches :31021–:31024 (avoids CORS entirely).
  # Upstream = published ports on the Docker host (league/task/vue/solid containers).
  location /mf/league/ {
    proxy_pass http://host.docker.internal:31021/;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /mf/task-react/ {
    proxy_pass http://host.docker.internal:31022/;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /mf/task-vue/ {
    proxy_pass http://host.docker.internal:31023/;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /mf/task-solid/ {
    proxy_pass http://host.docker.internal:31024/;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
